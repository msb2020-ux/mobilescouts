<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Headless Horseman Flash Sale Flyer</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
  @page {
    size: 8.5in 11in;
    margin: 0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 8.5in;
    height: 11in;
    background: #0a0603;
    font-family: 'Crimson Text', Georgia, serif;
    overflow: hidden;
  }

  .page {
    width: 8.5in;
    height: 11in;
    position: relative;
    background: #09080a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── DARK PARCHMENT TEXTURE BG ── */
  .bg-texture {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, #1a1008 0%, #080506 55%, #050304 100%);
    z-index: 0;
  }

  /* ── TOP SECTION: dark band ── */
  .top-band {
    position: relative;
    z-index: 2;
    width: 100%;
    background: linear-gradient(180deg, #060406 0%, #0c0a08 60%, transparent 100%);
    padding: 0.28in 0.5in 0.15in;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── FLASH SALE BADGE ── */
  .flash-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #8b1a0e;
    border: 1.5px solid #c94a1a;
    padding: 5px 22px;
    margin-bottom: 10px;
    position: relative;
  }
  .flash-badge::before,
  .flash-badge::after {
    content: '◆';
    color: #c94a1a;
    font-size: 9px;
  }
  .flash-badge-text {
    font-family: 'Cinzel', serif;
    font-size: 11.5pt;
    font-weight: 900;
    letter-spacing: 0.32em;
    color: #fff8e8;
    text-transform: uppercase;
  }

  .save-pct {
    font-family: 'Cinzel', serif;
    font-size: 28pt;
    font-weight: 900;
    color: #f5d060;
    letter-spacing: 0.05em;
    line-height: 1;
    text-shadow: 0 0 30px rgba(245,208,96,0.6), 0 2px 6px rgba(0,0,0,0.9);
    margin-bottom: 3px;
  }
  .save-pct span {
    font-size: 16pt;
    color: #e8b840;
    letter-spacing: 0.2em;
  }

  .sale-dates {
    font-family: 'Cinzel', serif;
    font-size: 11pt;
    font-weight: 600;
    color: #c8922a;
    letter-spacing: 0.28em;
    margin-bottom: 8px;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 90%;
    margin: 6px 0;
  }
  .div-line {
    flex: 1;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, rgba(200,146,42,0.7), rgba(200,146,42,0.7));
  }
  .div-line.r {
    background: linear-gradient(90deg, rgba(200,146,42,0.7), rgba(200,146,42,0.7), transparent);
  }
  .diamond {
    width: 6px; height: 6px;
    background: rgba(200,146,42,0.85);
    transform: rotate(45deg);
    flex-shrink: 0;
  }
  .diamond.sm { width:4px; height:4px; }

  /* ── HERO IMAGE ── */
  .hero-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 15%;
    display: block;
    /* subtle darkening at top and bottom edges to blend */
    mask-image: linear-gradient(
      180deg,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,1) 8%,
      rgba(0,0,0,1) 88%,
      rgba(0,0,0,0.2) 100%
    );
    -webkit-mask-image: linear-gradient(
      180deg,
      rgba(0,0,0,0.3) 0%,
      rgba(0,0,0,1) 8%,
      rgba(0,0,0,1) 88%,
      rgba(0,0,0,0.2) 100%
    );
  }

  /* ── BOTTOM SECTION ── */
  .bottom-band {
    position: relative;
    z-index: 2;
    width: 100%;
    background: linear-gradient(0deg, #060406 0%, #0c0a08 55%, transparent 100%);
    padding: 0.14in 0.5in 0.26in;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .register-label {
    font-family: 'Cinzel', serif;
    font-size: 9.5pt;
    font-weight: 600;
    letter-spacing: 0.38em;
    color: rgba(180,155,100,0.7);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .url-block {
    font-family: 'Cinzel', serif;
    font-size: 26pt;
    font-weight: 900;
    color: #f5d060;
    letter-spacing: 0.12em;
    text-shadow: 0 0 40px rgba(245,208,96,0.55), 0 2px 8px rgba(0,0,0,0.9);
    margin-bottom: 10px;
    line-height: 1;
  }

  .url-underline {
    width: 3.6in;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, rgba(200,146,42,0.8), transparent);
    margin: 0 auto 10px;
  }

  /* 2-col info row */
  .info-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    width: 100%;
    margin-bottom: 4px;
  }
  .info-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0.28in;
    flex: 1;
  }
  .info-sep {
    width: 1px;
    height: 36px;
    background: rgba(200,146,42,0.35);
    flex-shrink: 0;
  }
  .info-label {
    font-family: 'Cinzel', serif;
    font-size: 7.5pt;
    font-weight: 600;
    letter-spacing: 0.32em;
    color: rgba(180,140,80,0.65);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .info-value {
    font-family: 'Cinzel', serif;
    font-size: 11.5pt;
    font-weight: 700;
    color: #e8d4a0;
    letter-spacing: 0.08em;
  }
  .info-value.blood {
    color: #c04020;
    font-style: normal;
  }

  .tagline-bottom {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 11pt;
    color: rgba(160,130,80,0.65);
    letter-spacing: 0.1em;
    margin-top: 6px;
  }

  /* ── DECORATIVE FRAME ── */
  .frame-outer {
    position: absolute;
    inset: 0.18in;
    border: 1px solid rgba(200,146,42,0.22);
    pointer-events: none;
    z-index: 5;
  }
  .corner-orn {
    position: absolute;
    width: 22px; height: 22px;
    z-index: 6;
    pointer-events: none;
  }
  .corner-orn.tl { top:0.12in; left:0.12in; border-top:2px solid rgba(200,146,42,0.6); border-left:2px solid rgba(200,146,42,0.6); }
  .corner-orn.tr { top:0.12in; right:0.12in; border-top:2px solid rgba(200,146,42,0.6); border-right:2px solid rgba(200,146,42,0.6); }
  .corner-orn.bl { bottom:0.12in; left:0.12in; border-bottom:2px solid rgba(200,146,42,0.6); border-left:2px solid rgba(200,146,42,0.6); }
  .corner-orn.br { bottom:0.12in; right:0.12in; border-bottom:2px solid rgba(200,146,42,0.6); border-right:2px solid rgba(200,146,42,0.6); }

  /* ── PRINT OVERRIDES ── */
  @media print {
    html, body { width:8.5in; height:11in; }
    .page { page-break-after: avoid; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
